name: Python CI

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches: [ "main", "master", "develop" ]
    types: [opened, reopened, synchronize]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root
        shell: bash

      # 모든 브랜치(main, master, develop)에서 항상 실행
      - name: Run Tests & Lint
        run: |
           poetry run ruff check .
           poetry run pytest
        shell: bash

      # 아래 단계들은 develop 브랜치를 향한 PR일 때만 실행
      - name: Get current time
        if: github.base_ref == 'develop'
        uses: 1466587594/get-current-time@v2
        id: current-time
        with:
          format: YYYY-MM-DDTHH-mm-ss
          utcOffset: "+09:00"

      - name: Show Current Time
        if: github.base_ref == 'develop'
        run: echo "CurrentTime=${{steps.current-time.outputs.formattedTime}}"
        shell: bash

      - name: ChatGPT codeReviewer
        if: github.base_ref == 'develop'
        uses: anc95/ChatGPT-CodeReview@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MODEL: o3-mini
          OPENAI_API_ENDPOINT: https://api.openai.com/v1
          LANGUAGE: Korean
          PROMPT: |
            당신은 Google/Meta 출신의 수석 엔지니어이자, Python(FastAPI) 생태계의 최고 전문가입니다.
            팀원의 성장을 돕는 멘토로서 이 PR을 다음 기준에 맞춰 리뷰해주세요:

            **[리뷰 원칙]**
            1. 🐍 **Pythonic & Robust:** 단순히 동작하는 코드가 아니라, 'Pythonic'한 관용구(Idioms)와 PEP 8 표준을 준수하는지 확인합니다. FastAPI의 비동기 처리(Async/Await)와 Pydantic 모델 검증이 적절한지 엄격히 봅니다.
            2. 🤝 **존중과 배려:** 리뷰 받는 사람이 방어적이 되지 않도록, 부드럽고 건설적인 톤(Tone)을 유지하세요. 모든 문장 끝이나 주요 항목에 적절한 이모지를 사용하여 분위기를 부드럽게 만드세요.
            3. 💡 **해결책 중심:** 문제 지적에서 끝나지 말고, Type Hinting이 포함된 수정된 코드 스니펫을 반드시 제공하세요.

            **[피드백 구조]**
            각 코멘트는 다음 태그를 포함해야 합니다:
            - 🚨 **P0 (Critical):** 로직 에러, 보안 취약점(SQL Injection 등), 심각한 비동기 병목(Blocking I/O), 메모리 누수 (즉시 수정 필요)
            - ⚠️ **P1 (Important):** 가독성, 유지보수성, 과도한 복잡도, Pydantic 모델 오용, Type Hint 누락 (배포 전 수정 권장)
            - 🎨 **P2 (Nitpick):** 변수명, 독스트링(Docstring), 포맷팅, 불필요한 import 등 사소한 개선 사항
            - 👏 **Compliment:** 깔끔한 비동기 로직, 효율적인 의존성 주입(DI), 또는 창의적인 해결책에 대한 칭찬

            리뷰의 마지막에는 PR 전체에 대한 한 줄 요약과 격려의 말을 덧붙여주세요.
